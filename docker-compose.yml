services:
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: runtrace
      POSTGRES_USER: runtrace
      POSTGRES_PASSWORD: runtrace
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U runtrace"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - runtrace-postgres:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      RUNTRACE_DATABASE_URL: postgresql+psycopg://runtrace:runtrace@postgres:5432/runtrace
      RUNTRACE_ARTIFACT_PATH: /data/artifacts
      RUNTRACE_CORS_ORIGINS: "${RUNTRACE_CORS_ORIGINS:-http://localhost:3000}"
      RUNTRACE_SEED_DEMO: "${RUNTRACE_DEV:-false}"
      RUNTRACE_DEV: "${RUNTRACE_DEV:-false}"
      RUNTRACE_AUTO_MIGRATE: "false"
      RUNTRACE_EMBEDDINGS_ENABLED: "${RUNTRACE_EMBEDDINGS_ENABLED:-false}"
      RUNTRACE_EMBEDDING_CACHE_PATH: /data/models
      RUNTRACE_WEBAUTHN_RP_ID: "${RUNTRACE_WEBAUTHN_RP_ID:-localhost}"
      RUNTRACE_WEBAUTHN_RP_NAME: "${RUNTRACE_WEBAUTHN_RP_NAME:-RunTrace}"
      RUNTRACE_WEBAUTHN_ORIGINS: "${RUNTRACE_WEBAUTHN_ORIGINS:-https://localhost:3000,http://localhost:3000}"
      RUNTRACE_SESSION_TTL_HOURS: "${RUNTRACE_SESSION_TTL_HOURS:-168}"
      RUNTRACE_SETUP_LINK_TTL_HOURS: "${RUNTRACE_SETUP_LINK_TTL_HOURS:-24}"
      RUNTRACE_CLAIM_TIMEOUT_SECONDS: "${RUNTRACE_CLAIM_TIMEOUT_SECONDS:-300}"
      RUNTRACE_MAX_ARTIFACT_SIZE: "${RUNTRACE_MAX_ARTIFACT_SIZE:-10485760}"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - runtrace-artifacts:/data/artifacts
      - runtrace-models:/data/models
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    init: true

  mcp:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: ["runtrace-mcp"]
    environment:
      RUNTRACE_BASE_URL: http://api:8000
      RUNTRACE_API_TOKEN: "${RUNTRACE_API_TOKEN:-}"
    depends_on:
      api:
        condition: service_healthy
    profiles: ["mcp"]

  web:
    build:
      context: apps/web
      args:
        INTERNAL_API_URL: http://api:8000
    environment:
      INTERNAL_API_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    init: true

volumes:
  runtrace-postgres:
  runtrace-artifacts:
  runtrace-models:
