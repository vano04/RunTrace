services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: runtrace
      POSTGRES_USER: runtrace
      POSTGRES_PASSWORD: runtrace
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U runtrace"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - runtrace-postgres:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      RUNTRACE_DATABASE_URL: sqlite:////data/runtrace.db
      RUNTRACE_ARTIFACT_PATH: /data/artifacts
      RUNTRACE_CORS_ORIGINS: http://localhost:3000
      RUNTRACE_SEED_DEMO: "false"
      RUNTRACE_AUTO_MIGRATE: "false"
      RUNTRACE_EMBEDDINGS_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./data/runtrace.db:/data/runtrace.db
      - runtrace-artifacts:/data/artifacts

  mcp:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: ["runtrace-mcp"]
    environment:
      RUNTRACE_BASE_URL: http://api:8000
    depends_on:
      - api
    profiles: ["mcp"]

  web:
    build:
      context: apps/web
      args:
        INTERNAL_API_URL: http://api:8000
    environment:
      INTERNAL_API_URL: http://api:8000
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  runtrace-postgres:
  runtrace-artifacts:
  runtrace-models:
